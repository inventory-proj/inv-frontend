<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SaaS Server Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        
        .glass-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 1050;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .glass-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .glass-modal-content {
            background: white; padding: 2rem; border-radius: 16px; width: 100%; max-width: 500px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); transform: translateY(-20px); transition: transform 0.3s ease;
        }
        .glass-modal-overlay.active .glass-modal-content { transform: translateY(0); }
        
        .code-block { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 8px; font-family: monospace; word-break: break-all; }
        .nav-tabs .nav-link { cursor: pointer; color: #6c757d; }
        .nav-tabs .nav-link.active { font-weight: bold; color: #0d6efd; }
        .btn:disabled { cursor: not-allowed; opacity: 0.7; }
        .invite-link-box { background: #e9ecef; border: 1px dashed #6c757d; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.9rem; word-break: break-all; }
        
        /* Стили Аккордеона */
        .accordion-button:not(.collapsed) { background-color: #e7f1ff; color: #0c63e4; }
        .accordion-button::after { margin-left: auto; }
        .group-actions { z-index: 10; }
        .group-actions button { pointer-events: auto; }
    </style>
</head>
<body>

    <!-- УНИВЕРСАЛЬНАЯ МОДАЛКА ОШИБОК -->
    <div id="info-modal" class="glass-modal-overlay" style="z-index: 1100;">
        <div class="glass-modal-content" style="max-width: 350px; text-align: center;">
            <h5 id="info-title" class="fw-bold mb-3">Внимание</h5>
            <p id="info-msg" class="text-muted mb-4"></p>
            <button class="btn btn-primary w-100 fw-bold" onclick="closeInfoModal()">Понятно</button>
        </div>
    </div>

    <!-- МОДАЛКА ПОДТВЕРЖДЕНИЯ -->
    <div id="confirm-modal" class="glass-modal-overlay" style="z-index: 1100;">
        <div class="glass-modal-content" style="max-width: 350px; text-align: center;">
            <h5 class="fw-bold mb-3 text-danger">Подтверждение</h5>
            <p id="confirm-msg" class="text-muted mb-4">Вы уверены?</p>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary w-50 fw-bold" onclick="closeConfirmModal()">Отмена</button>
                <button id="confirm-action-btn" class="btn btn-danger w-50 fw-bold">Удалить</button>
            </div>
        </div>
    </div>

    <!-- АВТОРИЗАЦИЯ -->
    <div id="auth-screen" class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="card p-4" style="width: 400px;">
            <h3 class="text-center mb-3 text-primary fw-bold">SaaS Monitor</h3>
            
            <ul class="nav nav-tabs mb-4 d-flex w-100">
                <li class="nav-item flex-fill text-center"><a class="nav-link active" id="tab-login" onclick="switchAuthTab('login')">Вход</a></li>
                <li class="nav-item flex-fill text-center"><a class="nav-link" id="tab-register" onclick="switchAuthTab('register')">Регистрация</a></li>
            </ul>
            
            <div id="form-login">
                <input type="email" id="login-email" class="form-control mb-3" placeholder="Email">
                <input type="password" id="login-password" class="form-control mb-4" placeholder="Пароль">
                <button id="btn-login" class="btn btn-primary w-100 fw-bold" onclick="login()">Войти</button>
            </div>

            <div id="form-register" class="hidden">
                <input type="text" id="reg-username" class="form-control mb-3" placeholder="Никнейм (только латиница и цифры)">
                <input type="email" id="reg-email" class="form-control mb-3" placeholder="Ваш Email">
                <input type="password" id="reg-password" class="form-control mb-4" placeholder="Придумайте пароль">
                <button id="btn-register" class="btn btn-success w-100 fw-bold" onclick="register()">Создать аккаунт</button>
            </div>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="app-screen" class="hidden">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container-fluid px-4">
                <a class="navbar-brand fw-bold text-primary" href="#">SaaS Monitor</a>
                <div class="ms-auto d-flex align-items-center gap-3">
                    <span class="text-light ms-3 fw-bold" id="user-greeting"></span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Выйти</button>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4 mx-auto" style="max-width: 1200px;">
            <div id="global-admin-panel" class="card p-3 mb-4 border-start border-danger border-4 hidden">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="m-0 text-danger fw-bold">SuperAdmin Panel</h5>
                    <button class="btn btn-sm btn-danger fw-bold" onclick="exportData()">Скачать Backup БД</button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">Рабочие пространства</h3>
                <button class="btn btn-outline-primary fw-bold px-4" onclick="openCreateGroupModal()">+ Новая группа</button>
            </div>

            <!-- АККОРДЕОН С ГРУППАМИ -->
            <div class="accordion mb-5" id="dashboard-accordion">
                <!-- Генерируется через JS -->
            </div>
        </div>
    </div>

    <!-- МОДАЛКА: Новая Группа -->
    <div id="create-group-modal" class="glass-modal-overlay">
        <div class="glass-modal-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Создание группы</h4>
                <button type="button" class="btn-close" onclick="closeModal('create-group-modal')"></button>
            </div>
            <input type="text" id="new-group-name" class="form-control mb-4" placeholder="Название группы (например: Backend Team)">
            <button id="btn-create-group" class="btn btn-primary w-100 fw-bold" onclick="createGroup()">Создать</button>
        </div>
    </div>

    <!-- МОДАЛКА: Сервер (Добавление/Просмотр команды) -->
    <div id="server-modal" class="glass-modal-overlay">
        <div class="glass-modal-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0" id="server-modal-title">Добавление сервера</h4>
                <button type="button" class="btn-close" onclick="closeModal('server-modal')"></button>
            </div>
            
            <div id="server-modal-step-1">
                <input type="hidden" id="server-workspace-id">
                <input type="text" id="new-host" class="form-control mb-3" placeholder="Название (например: web-prod-01)">
                <input type="text" id="new-ip" class="form-control mb-4" placeholder="IP Адрес">
                <button id="btn-create-server" class="btn btn-primary w-100 fw-bold" onclick="createServer()">Создать и получить токен</button>
            </div>

            <div id="server-modal-step-2" class="hidden">
                <div class="alert alert-info text-center fw-bold" id="server-modal-status">Установка Агента</div>
                <p>Выполните на сервере от имени <b>root</b>:</p>
                <div class="code-block mb-3" id="install-command"></div>
                <button class="btn btn-secondary w-100 fw-bold mb-2" onclick="copyText('install-command', 'Команда скопирована!')">Скопировать</button>
                <button class="btn btn-outline-dark w-100" onclick="closeModal('server-modal')">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА: Приглашение участника -->
    <div id="invite-modal" class="glass-modal-overlay">
        <div class="glass-modal-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Приглашение в группу</h4>
                <button type="button" class="btn-close" onclick="closeModal('invite-modal')"></button>
            </div>
            
            <div class="mb-4">
                <input type="hidden" id="invite-workspace-id">
                <label class="form-label text-muted small fw-bold">Никнейм пользователя</label>
                <div class="d-flex gap-2 mb-2">
                    <input type="text" id="invite-username" class="form-control" placeholder="@username">
                    <button id="btn-invite" class="btn btn-success fw-bold" onclick="inviteColleague()">Добавить</button>
                </div>
                <div id="invite-link-container" class="hidden mt-3">
                    <p class="text-success small fw-bold mb-1">Пользователь добавлен! Отправьте ему ссылку:</p>
                    <div class="d-flex gap-2">
                        <div class="invite-link-box flex-fill text-muted" id="invite-link-text"></div>
                        <button class="btn btn-outline-secondary btn-sm" onclick="copyText('invite-link-text', 'Ссылка скопирована!')">Копировать</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // --- UX ---
        function showInfo(title, msg) {
            document.getElementById('info-title').innerText = title;
            document.getElementById('info-msg').innerText = msg;
            document.getElementById('info-modal').classList.add('active');
        }
        function closeInfoModal() { document.getElementById('info-modal').classList.remove('active'); }
        
        function showConfirm(msg, actionFn) {
            document.getElementById('confirm-msg').innerText = msg;
            const btn = document.getElementById('confirm-action-btn');
            btn.onclick = () => { actionFn(); closeConfirmModal(); };
            document.getElementById('confirm-modal').classList.add('active');
        }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.remove('active'); }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            if(id !== 'info-modal' && id !== 'confirm-modal') loadDashboard();
        }

        function setButtonLoading(btnId, isLoading, originalText = '') {
            const btn = document.getElementById(btnId);
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Загрузка...';
            } else {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function copyText(elementId, successMsg) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => { showInfo("Успех", successMsg); }).catch(err => {
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = text;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand("copy");
                document.body.removeChild(tempTextArea);
                showInfo("Успех", successMsg);
            });
        }

        // --- AUTH ---
        function switchAuthTab(tab) {
            if (tab === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-register').classList.remove('active');
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('form-register').classList.add('hidden');
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('form-register').classList.remove('hidden');
                document.getElementById('form-login').classList.add('hidden');
            }
        }

        async function login() {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-password').value;
            if(!e || !p) return showInfo('Ошибка', "Заполните все поля");

            setButtonLoading('btn-login', true);
            const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: e, password: p}) });
            setButtonLoading('btn-login', false, 'Войти');

            if (res.ok) { saveAuth(await res.json()); } 
            else { showInfo('Ошибка входа', "Неверная почта или пароль"); }
        }

        async function register() {
            const u = document.getElementById('reg-username').value.trim();
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-password').value;
            
            if(!u || !e || !p) return showInfo('Ошибка', "Заполните все поля");
            if(!/^[a-zA-Z0-9_]{3,30}$/.test(u.replace('@',''))) return showInfo('Ошибка', "Никнейм должен быть от 3 до 30 символов, только латиница, цифры и _");

            setButtonLoading('btn-register', true);
            const res = await fetch(`${API_URL}/users`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u.replace('@',''), email: e, password: p}) });
            setButtonLoading('btn-register', false, 'Создать аккаунт');

            if (res.ok) {
                document.getElementById('login-email').value = e;
                document.getElementById('login-password').value = p;
                showInfo('Успех', 'Регистрация прошла успешно! Входим...');
                setTimeout(login, 1500);
            } else {
                const data = await res.json();
                showInfo('Ошибка', data.detail || "Произошла ошибка");
            }
        }

        function saveAuth(data) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('role', data.role);
            localStorage.setItem('username', data.username);
            checkAuth();
        }

        function logout() { localStorage.clear(); checkAuth(); }

        function getHeaders() { return { 'Authorization': `Bearer ${localStorage.getItem('token')}`, 'Content-Type': 'application/json' }; }

        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (token && token !== "undefined") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-greeting').innerText = `@${localStorage.getItem('username')}`;
                if (localStorage.getItem('role') === 'global_admin') document.getElementById('global-admin-panel').classList.remove('hidden');
                
                loadDashboard();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        }

        // --- DASHBOARD (АККОРДЕОН) ---
        async function loadDashboard() {
            const res = await fetch(`${API_URL}/dashboard`, { headers: getHeaders() });
            if (res.status === 401) { logout(); return; }
            
            const workspaces = await res.json();
            const container = document.getElementById('dashboard-accordion');
            container.innerHTML = '';
            
            if(workspaces.length === 0) {
                container.innerHTML = '<div class="text-center text-muted mt-5">У вас нет активных групп.</div>';
                return;
            }

            workspaces.forEach((ws, index) => {
                const isExpanded = index === 0 ? 'true' : 'false';
                const collapseClass = index === 0 ? 'show' : '';
                
                let inviteBtn = ws.is_owner 
                    ? `<button class="btn btn-sm btn-outline-success fw-bold ms-2" onclick="event.stopPropagation(); openInviteModal(${ws.id})">+ участник</button>` 
                    : '';

                // Генерация строк серверов (БЕЗ ID)
                let serversHtml = '';
                if(ws.servers.length === 0) {
                    serversHtml = '<tr><td colspan="4" class="text-center text-muted">В этой группе пока нет серверов</td></tr>';
                } else {
                    ws.servers.forEach(s => {
                        let badgeClass = s.status === 'active' ? 'bg-success' : 'bg-secondary';
                        serversHtml += `
                            <tr>
                                <td class="fw-bold">${s.hostname}</td>
                                <td>${s.ip_address}</td>
                                <td><span class="badge ${badgeClass}">${s.status.toUpperCase()}</span></td>
                                <td>
                                    <div class="d-flex justify-content-end gap-2">
                                        <button class="btn btn-sm btn-outline-primary fw-bold" onclick="viewMonitoring('${s.hostname}')">📊 Логи</button>
                                        <button class="btn btn-sm btn-outline-dark fw-bold" onclick="showAgentCommand('${s.agent_token}')">⚙️ Агент</button>
                                        <button class="btn btn-sm btn-outline-danger fw-bold" onclick="deleteServer(${s.id}, '${s.hostname}')">🗑</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }

                // Генерация списка участников
                let membersText = ws.members.map(m => `@${m.username}`).join(', ');

                let accHtml = `
                <div class="accordion-item shadow-sm border-0 mb-3 rounded overflow-hidden">
                    <h2 class="accordion-header" id="heading-${ws.id}">
                        <button class="accordion-button ${index !== 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-${ws.id}">
                            <div class="d-flex justify-content-between w-100 align-items-center me-3">
                                <div>
                                    <span class="fw-bold fs-5">${ws.name}</span>
                                    <div class="small text-muted mt-1">Участники: ${membersText}</div>
                                </div>
                                <div class="group-actions">
                                    <button class="btn btn-sm btn-primary fw-bold" onclick="event.stopPropagation(); openAddServerModal(${ws.id})">+ сервер</button>
                                    ${inviteBtn}
                                </div>
                            </div>
                        </button>
                    </h2>
                    <div id="collapse-${ws.id}" class="accordion-collapse collapse ${collapseClass}">
                        <div class="accordion-body p-0">
                            <table class="table table-hover align-middle m-0">
                                <thead class="table-light">
                                    <tr><th>Хостнейм</th><th>IP Адрес</th><th>Статус</th><th class="text-end">Действия</th></tr>
                                </thead>
                                <tbody>${serversHtml}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
                `;
                container.innerHTML += accHtml;
            });
        }

        // --- GROUP ACTIONS ---
        function openCreateGroupModal() {
            document.getElementById('new-group-name').value = '';
            document.getElementById('create-group-modal').classList.add('active');
        }

        async function createGroup() {
            const name = document.getElementById('new-group-name').value;
            if(!name) return;
            setButtonLoading('btn-create-group', true);
            const res = await fetch(`${API_URL}/workspaces`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({name: name}) });
            setButtonLoading('btn-create-group', false, 'Создать');
            if(res.ok) closeModal('create-group-modal');
            else showInfo('Ошибка', 'Не удалось создать группу');
        }

        function openInviteModal(wsId) {
            document.getElementById('invite-workspace-id').value = wsId;
            document.getElementById('invite-username').value = '';
            document.getElementById('invite-link-container').classList.add('hidden');
            document.getElementById('invite-modal').classList.add('active');
        }

        async function inviteColleague() {
            const u = document.getElementById('invite-username').value;
            const wsId = document.getElementById('invite-workspace-id').value;
            if(!u) return;
            
            setButtonLoading('btn-invite', true);
            const res = await fetch(`${API_URL}/team/invite`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({username: u, workspace_id: parseInt(wsId)}) });
            setButtonLoading('btn-invite', false, 'Добавить');
            
            const data = await res.json();
            if (res.ok) {
                document.getElementById('invite-username').value = '';
                document.getElementById('invite-link-text').innerText = data.invite_link;
                document.getElementById('invite-link-container').classList.remove('hidden');
                loadDashboard(); // Обновляем список в фоне
            } else showInfo('Ошибка', data.detail);
        }

        // --- SERVER ACTIONS ---
        function openAddServerModal(wsId) {
            document.getElementById('server-workspace-id').value = wsId;
            document.getElementById('new-host').value = '';
            document.getElementById('new-ip').value = '';
            document.getElementById('server-modal-step-1').classList.remove('hidden');
            document.getElementById('server-modal-step-2').classList.add('hidden');
            document.getElementById('server-modal-title').innerText = "Добавление сервера";
            document.getElementById('server-modal').classList.add('active');
        }

        async function createServer() {
            const data = { 
                hostname: document.getElementById('new-host').value, 
                ip_address: document.getElementById('new-ip').value,
                workspace_id: parseInt(document.getElementById('server-workspace-id').value)
            };
            if(!data.hostname || !data.ip_address) return showInfo("Внимание", "Заполните все поля!");

            setButtonLoading('btn-create-server', true);
            const res = await fetch(`${API_URL}/servers`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(data) });
            setButtonLoading('btn-create-server', false, 'Создать и получить токен');
            
            if (res.ok) {
                const responseData = await res.json();
                document.getElementById('server-modal-status').innerText = "Сервер зарегистрирован!";
                showAgentCommand(responseData.agent_token);
            } else showInfo("Ошибка", (await res.json()).detail || "Произошла ошибка");
        }

        function showAgentCommand(token) {
            document.getElementById('server-modal-step-1').classList.add('hidden');
            document.getElementById('server-modal-step-2').classList.remove('hidden');
            document.getElementById('server-modal-title').innerText = "Настройка агента";
            document.getElementById('server-modal-status').innerText = "Инструкция по установке";
            document.getElementById('install-command').innerText = `curl -sL https://inv.e-laba52.ru/agent.sh | sudo bash -s -- --token=${token}`;
            document.getElementById('server-modal').classList.add('active');
        }

        function viewMonitoring(hostname) {
            showInfo(`Мониторинг: ${hostname}`, "Данные собираются, но просмотрщик (Grafana) еще не настроен. Это наш следующий шаг!");
        }

        function deleteServer(id, hostname) {
            showConfirm(`Вы действительно хотите удалить сервер ${hostname}? Сбор логов будет прекращен.`, async () => {
                const res = await fetch(`${API_URL}/servers/${id}`, { method: 'DELETE', headers: getHeaders() });
                if(res.ok) { loadDashboard(); showInfo("Успех", "Сервер удален."); }
                else showInfo("Ошибка", "Не удалось удалить сервер.");
            });
        }

        function exportData() {
            fetch('/api/export', { headers: getHeaders() })
                .then(res => res.blob())
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = "backup.json";
                    document.body.appendChild(a); a.click(); a.remove();
                });
        }

        if (localStorage.getItem('token') === "undefined" || localStorage.getItem('token') === null) { logout(); } 
        else { checkAuth(); }
    </script>
</body>
</html>
